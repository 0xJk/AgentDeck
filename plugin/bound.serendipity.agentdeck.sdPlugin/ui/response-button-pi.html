<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="sdpi-components.js"></script>
  <style>
    .sdpi-info {
      margin: 0 1em 0.5em;
      padding: 0.5em 0.75em;
      font-size: 11px;
      color: #999;
      line-height: 1.5;
      border-left: 2px solid #444;
    }
    .sdpi-info code {
      background: #333;
      padding: 1px 4px;
      border-radius: 3px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <sdpi-item label="Button Label">
    <sdpi-textfield setting="label" placeholder="FIX"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Action">
    <sdpi-textarea setting="action" placeholder="Text or /command to send"></sdpi-textarea>
  </sdpi-item>
  <div class="sdpi-info">
    Examples:<br/>
    <code>/compact</code> <code>/status</code> — slash command<br/>
    <code>Please fix the bug</code> — prompt to Claude
  </div>
</body>
</html>
