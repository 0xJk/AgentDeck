<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="sdpi-components.js"></script>
  <style>
    .sdpi-info {
      margin: 0 1em 0.5em;
      padding: 0.5em 0.75em;
      font-size: 11px;
      color: #999;
      line-height: 1.5;
      border-left: 2px solid #444;
    }
    .sdpi-info code {
      background: #333;
      padding: 1px 4px;
      border-radius: 3px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <sdpi-item label="Commands (one per line)">
    <sdpi-textarea setting="commandList" placeholder="/compact&#10;/status&#10;/usage&#10;/clear&#10;/model"></sdpi-textarea>
  </sdpi-item>
  <div class="sdpi-info">
    Dial rotates through this list. Push executes the selected command.<br/>
    Example: <code>/compact</code> <code>/status</code> <code>/clear</code>
  </div>
</body>
</html>
